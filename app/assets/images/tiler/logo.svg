<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Tiler">
  <title>Tiler</title>
  <!-- Mark: a 2x2 dashboard tile grid with one accent tile -->
  <g transform="translate(8, 12)">
    <rect x="0"  y="0"  width="24" height="24" rx="4" fill="#111827"/>
    <rect x="28" y="0"  width="24" height="24" rx="4" fill="#3b82f6"/>
    <rect x="0"  y="28" width="24" height="24" rx="4" fill="#111827"/>
    <rect x="28" y="28" width="24" height="24" rx="4" fill="#111827"/>
  </g>
  <!-- Wordmark -->
  <text x="80" y="52"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="44" font-weight="700" fill="#111827" letter-spacing="-0.03em">tiler</text>
</svg>
